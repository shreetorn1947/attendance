<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shreetron India Ltd - Attendance</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #c9d6ff, #e2e2e2);
    }.header {
  background: #ffffff;
  padding: 15px 25px;
  font-size: 30px;
  font-weight: bold;
  color: #1f6fa3;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.sub-header {
  background: #1f6fa3;
  color: #fff;
  padding: 8px;
  font-size: 18px;
  text-align: center;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px;
  gap: 25px;
}

.left-panel {
  width: 520px;
  background: linear-gradient(135deg, #0f3c5f, #1f6fa3);
  color: #fff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  text-align: center;
}

.left-panel h3 {
  margin-top: 0;
  font-size: 22px;
  letter-spacing: 0.5px;
}

.attendance-box {
  background: #ffffff;
  color: #000;
  padding: 14px;
  border-radius: 6px;
  margin: 15px auto 25px;
  font-size: 24px;
  width: 80%;
  text-align: center;
  border: 2px solid #1f6fa3;
  outline: none;
}

.attendance-box:focus {
  border-color: #ffcc00;
  box-shadow: 0 0 6px rgba(255,204,0,0.8);
}

.consent {
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 15px;
  text-align: left;
}

.biometric-icons {
  display: flex;
  justify-content: center;
  gap: 35px;
  margin-top: 25px;
}

.icon {
  width: 70px;
  height: 70px;
  background: #ffffff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  color: #1f6fa3;
  cursor: pointer;
  transition: transform 0.2s;
}

.icon:hover {
  transform: scale(1.1);
}

.keypad {
  width: 260px;
  background: #ffffff;
  padding: 20px;
  border-radius: 12px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.keypad button {
  padding: 18px;
  font-size: 22px;
  border: none;
  border-radius: 8px;
  background: #eaf2fb;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.keypad button:hover {
  background: #cfe4f7;
  transform: translateY(-2px);
}

.submit-btn {
  grid-column: span 3;
  background: #1f6fa3 !important;
  color: #fff;
  font-weight: bold;
}

.footer {
  text-align: center;
  padding: 12px;
  font-size: 12px;
  color: #444;
}

  </style>
</head>
<body>  <div class="header">Shreetron India Ltd.</div>
  <div class="sub-header">Attendance System</div>  <div class="container"><div class="left-panel">
  <h3>Enter your Attendance ID</h3>
  <input id="attendanceId" class="attendance-box" type="text" value="15841-" />

  <div class="consent">
    <strong>User Consent:</strong> I hereby give my consent for biometric/OTP authentication only for attendance verification.
  </div>
  <div class="consent">
    <strong>Sharing Consent:</strong> Data will not be stored or shared further.
  </div>

  <div class="biometric-icons">
    <div class="icon" title="Fingerprint">👆</div>
    <div class="icon" title="Eye / Iris">👁️</div>
    <div class="icon" title="Home">🏠</div>
  </div>
</div>

<div class="keypad">
  <button onclick="addNum('1')">1</button>
  <button onclick="addNum('2')">2</button>
  <button onclick="addNum('3')">3</button>
  <button onclick="addNum('4')">4</button>
  <button onclick="addNum('5')">5</button>
  <button onclick="addNum('6')">6</button>
  <button onclick="addNum('7')">7</button>
  <button onclick="addNum('8')">8</button>
  <button onclick="addNum('9')">9</button>
  <button onclick="addNum('-')">-</button>
  <button onclick="addNum('0')">0</button>
  <button onclick="clearId()">C</button>
  <button class="submit-btn" onclick="submitAttendance()">SUBMIT</button>
</div>

  </div>  <div class="footer">SHREETRON - ABAS (UI Demo)</div>  <script>
    const input = document.getElementById('attendanceId');
    const maxLength = 15;

    function addNum(val) {
      if (input.value.length < maxLength) {
        input.value += val;
      }
      input.focus();
    }

    function clearId() {
      input.value = "";
      input.focus();
    }

    function submitAttendance() {
      if (input.value.trim() === "") {
        alert('Please enter Attendance ID');
      } else {
        alert('Attendance submitted successfully!\nID: ' + input.value);
        clearId();
      }
    }
  </script></body>
</html>
