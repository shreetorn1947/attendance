<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OAuth Login</title>

  <!-- Font Awesome for OAuth Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#141e30,#243b55);
    }

    .login-container{
      width:400px;
      background:rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.1);
      padding:35px;
      border-radius:20px;
      box-shadow:0 8px 30px rgba(0,0,0,0.4);
      color:white;
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
    }

    .logo i{
      font-size:55px;
      color:#4facfe;
    }

    .logo h2{
      margin-top:10px;
      font-size:28px;
      font-weight:600;
    }

    .input-group{
      margin-bottom:20px;
      position:relative;
    }

    .input-group i{
      position:absolute;
      left:15px;
      top:15px;
      color:#aaa;
    }

    .input-group input{
      width:100%;
      padding:14px 14px 14px 45px;
      border:none;
      border-radius:10px;
      outline:none;
      background:rgba(255,255,255,0.1);
      color:white;
      font-size:15px;
    }

    .input-group input::placeholder{
      color:#ccc;
    }

    .login-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#4facfe;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    .login-btn:hover{
      background:#2196f3;
      transform:scale(1.02);
    }

    .divider{
      text-align:center;
      margin:20px 0;
      color:#ccc;
      position:relative;
    }

    .divider::before,
    .divider::after{
      content:"";
      position:absolute;
      width:40%;
      height:1px;
      background:#666;
      top:50%;
    }

    .divider::before{
      left:0;
    }

    .divider::after{
      right:0;
    }

    .oauth-buttons{
      display:flex;
      gap:10px;
      flex-direction:column;
    }

    .oauth-btn{
      padding:12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:0.3s;
      font-weight:500;
    }

    .google{
      background:white;
      color:#333;
    }

    .github{
      background:#24292e;
      color:white;
    }

    .oauth-btn:hover{
      transform:translateY(-2px);
    }

    .error{
      margin-top:15px;
      text-align:center;
      color:#ff6b6b;
      font-size:14px;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      color:#bbb;
      font-size:13px;
    }
  </style>
</head>
<body>

  <div class="login-container">

    <div class="logo">
      <i class="fa-solid fa-shield-halved"></i>
      <h2>Secure Login</h2>
    </div>

    <div class="input-group">
      <i class="fa-solid fa-user"></i>
      <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="password" placeholder="Password">
    </div>

    <button class="login-btn" onclick="login()">
      Login
    </button>

    <div class="divider">OR</div>

    <!-- OAuth Showcase Buttons -->
    <div class="oauth-buttons">

      <button class="oauth-btn google">
        <i class="fa-brands fa-google"></i>
        Continue with Google
      </button>

      <button class="oauth-btn github">
        <i class="fa-brands fa-github"></i>
        Continue with GitHub
      </button>

    </div>

    <p class="error" id="error-msg"></p>

    <div class="footer">
      OAuth UI Showcase Demo
    </div>

  </div>

  <script>
    // Hardcoded Credentials
    const correctUsername = "admin";
    const correctPassword = "12345";

    function login(){

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("error-msg");

      if(username === correctUsername && password === correctPassword){

        // Redirect to index.html
        window.location.href = "index.html";

      } else {

        errorMsg.innerText = "Invalid Username or Password";

      }
    }
  </script>

</body>
</html>
